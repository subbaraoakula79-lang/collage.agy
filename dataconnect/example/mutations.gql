# Admission Portal Mutations

# Update student onboarding status
mutation UpdateOnboardingStep($userId: UUID!, $step: String!) @auth(level: USER) {
  studentProfile_update(key: { userId: $userId }, data: { onboardingStep: $step })
}

# Create a new application
mutation CreateApplication($studentId: UUID!, $courseId: UUID!, $admissionType: String!) @auth(level: USER) {
  application_insert(data: {
    studentUserId: $studentId,
    courseId: $courseId,
    admissionType: $admissionType,
    status: "PENDING"
  })
}

# Add a notification
mutation AddNotification($userId: UUID!, $title: String!, $message: String!, $type: String!) @auth(level: NO_ACCESS) {
  notification_insert(data: {
    userId: $userId,
    title: $title,
    message: $message,
    type: $type
  })
}
