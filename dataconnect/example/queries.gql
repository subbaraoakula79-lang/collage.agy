# Admission Portal Queries

# Get current user profile
query GetStudentByUserId($userId: UUID!) @auth(level: USER) {
  studentProfile(key: { userId: $userId }) {
    gender
    dateOfBirth
    category
    state
    onboardingStep
    user {
      name
      email
    }
  }
}

# List available courses by admission type
query ListCourses($admissionType: String!) @auth(level: PUBLIC) {
  courses(where: { admissionType: { eq: $admissionType }, isActive: { eq: true } }) {
    id
    name
    code
    totalSeats
    totalFee
    college {
      name
      city
    }
  }
}

# Get application status
query GetApplications($studentId: UUID!) @auth(level: USER) {
  applications(where: { studentUserId: { eq: $studentId } }) {
    status
    preference
    course {
      name
      college {
        name
      }
    }
  }
}
